<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAWDE NICKNAME</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1>LAWDE NICKNAME</h1>
<p>Powered By CK-ERROR</p>

<input type="text" id="nameInput" placeholder="Enter Your Name">

<div class="buttons">
<button onclick="generateNicknames()">Generate</button>
<button onclick="randomNick()">Random</button>
<button onclick="downloadTxt()">Download TXT</button>
<button onclick="toggleTheme()">Theme</button>
</div>

<input type="text" id="searchBox" placeholder="Search nickname..." onkeyup="searchNick()">

<div id="counter">Total: 0</div>

<div class="tabs">
<button onclick="setCategory('all')">ALL</button>
<button onclick="setCategory('vip')">VIP</button>
<button onclick="setCategory('gamer')">GAMER</button>
<button onclick="setCategory('ff')">FF</button>
<button onclick="setCategory('bgmi')">BGMI</button>
</div>

<div id="output"></div>

<h2>⭐ Favorites</h2>
<div id="favorites"></div>

</div>

<script src="script.js"></script>
</body>
</html>
